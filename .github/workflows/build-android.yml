name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Check directory structure
      run: |
        echo "Current directory:"
        pwd
        echo "Listing all files:"
        ls -la
        echo "Looking for package.json:"
        find . -name "package.json" 2>/dev/null || echo "No package.json found"
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Install dependencies
      run: |
        if [ -f "deeplinker-app/web/package.json" ]; then
          cd deeplinker-app/web
          npm ci
        elif [ -f "package.json" ]; then
          npm ci
        else
          echo "ERROR: package.json not found!"
          exit 1
        fi
    
    - name: Setup Capacitor
      run: |
        if [ -d "deeplinker-app/web" ]; then
          cd deeplinker-app/web
          npx cap sync android
        fi
    
    - name: Build APK
      run: |
        if [ -d "deeplinker-app/web/android" ]; then
          cd deeplinker-app/web/android
          ./gradlew assembleDebug
        fi
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: deeplinker-debug-apk
        path: deeplinker-app/web/android/app/build/outputs/apk/debug/app-debug.apk
      if: success()
