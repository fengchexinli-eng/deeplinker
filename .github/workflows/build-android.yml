name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Install dependencies
      working-directory: deeplinker-app/web
      run: npm ci
    
    - name: Sync Capacitor
      working-directory: deeplinker-app/web
      run: npx cap sync android
    
    - name: Build Debug APK
      working-directory: deeplinker-app/web/android
      run: ./gradlew assembleDebug
    
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: deeplinker-debug-apk
        path: deeplinker-app/web/android/app/build/outputs/apk/debug/app-debug.apk
